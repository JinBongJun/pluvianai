<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Official PluvianAI Emerald Background Circle -->
  <circle cx="50" cy="50" r="50" fill="#10b981" />
  
  <!-- White Filled Body (Bigger & Centered) -->
  <path 
    d="M15 50 C 15 15, 85 15, 85 50 L 85 85 L 15 85 Z" 
    fill="#ffffff" 
  />
  
  <!-- Eye (Emerald Cutout) -->
  <circle cx="38" cy="45" r="9" fill="#10b981" />
  
  <!-- Beak Segment Inside (Emerald) -->
  <path d="M60 65 L 85 48.3" stroke="#10b981" stroke-width="8" stroke-linecap="round" />
  
  <!-- Beak Segment Outside (White) -->
  <path d="M85 48.3 L 95 41.7" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
</svg>
