<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Precise Body Shape for clipping and filling -->
    <path id="birdBody" d="M20 50 C 20 20, 80 20, 80 50 L 80 85 L 20 85 Z" />
    <clipPath id="bodyClip">
      <use href="#birdBody" />
    </clipPath>
  </defs>

  <!-- Background: Emerald Clinical Circle -->
  <circle cx="50" cy="50" r="50" fill="#10b981" />
  
  <!-- Content Group: Scaled down and moved slightly up -->
  <g transform="translate(0, -6) scale(0.8)" transform-origin="50 50">
    <!-- Main Body: Filled with high-contrast white -->
    <use href="#birdBody" fill="#ffffff" />
    
    <!-- Eye Detail: Emerald Cutout -->
    <circle cx="42" cy="45" r="9" fill="#10b981" />
    
    <!-- Beak Line: White part (visible outside) -->
    <path d="M55 65 L 100 38" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
    
    <!-- Beak Line: Emerald part (clipped perfectly inside the body) -->
    <path d="M60 65 L 100 38" stroke="#10b981" stroke-width="8" stroke-linecap="butt" clip-path="url(#bodyClip)" />
  </g>
</svg>
