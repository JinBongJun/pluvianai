# Pytest config for GitHub Actions (see .github/workflows/ci.yml).
# Scope: unit tests only. Several integration modules and some unit files still
# expect disabled routes or older models — re-expand testpaths as tests are aligned.
[pytest]
testpaths = tests/unit
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    -q
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=xml
    --ignore=tests/unit/test_alert_service.py
    --ignore=tests/unit/test_billing_service.py
    --ignore=tests/unit/test_cost_analyzer.py
    --ignore=tests/unit/test_data_lifecycle_service.py
    --ignore=tests/unit/test_onboarding_service.py
    --ignore=tests/unit/test_drift_engine.py
    --ignore=tests/unit/test_upgrade_exception.py
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    slow: Slow running tests
