name: API Schema Change Detection

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/app/api/**'
      - 'backend/app/models/**'
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/app/api/**'
      - 'backend/app/models/**'

jobs:
  check-schema-changes:
    runs-on: ubuntu-latest
    name: Check API Schema Changes
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for comparison
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install openapi-spec-validator openapi-diff
      
      - name: Start backend server
        working-directory: ./backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 10
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          SECRET_KEY: test-secret-key
      
      - name: Fetch current OpenAPI schema
        run: |
          curl -s http://localhost:8000/openapi.json > current_schema.json || echo "{}" > current_schema.json
      
      - name: Fetch base branch OpenAPI schema
        run: |
          git checkout ${{ github.base_ref }} || git checkout main
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          uvicorn app.main:app --host 0.0.0.0 --port 8001 &
          sleep 10
          curl -s http://localhost:8001/openapi.json > base_schema.json || echo "{}" > base_schema.json
          git checkout ${{ github.head_ref }} || git checkout HEAD
        continue-on-error: true
      
      - name: Compare schemas
        run: |
          if [ -f base_schema.json ] && [ -f current_schema.json ]; then
            echo "🔍 Comparing API schemas..."
            
            # Use openapi-diff if available, otherwise use simple comparison
            if command -v openapi-diff &> /dev/null; then
              openapi-diff base_schema.json current_schema.json || true
            else
              echo "⚠️ openapi-diff not available, using basic comparison"
              python3 << 'EOF'
import json
import sys

try:
    with open('base_schema.json', 'r') as f:
        base = json.load(f)
    with open('current_schema.json', 'r') as f:
        current = json.load(f)
    
    # Check for breaking changes
    breaking_changes = []
    
    # Check removed endpoints
    base_paths = set(base.get('paths', {}).keys())
    current_paths = set(current.get('paths', {}).keys())
    removed = base_paths - current_paths
    if removed:
        breaking_changes.append(f"❌ Removed endpoints: {', '.join(removed)}")
    
    # Check removed request/response fields (simplified)
    for path in base_paths & current_paths:
        base_methods = set(base['paths'][path].keys())
        current_methods = set(current['paths'][path].keys())
        removed_methods = base_methods - current_methods
        if removed_methods:
            breaking_changes.append(f"❌ Removed methods from {path}: {', '.join(removed_methods)}")
    
    if breaking_changes:
        print("\n".join(breaking_changes))
        print("\n⚠️ Breaking changes detected! Please document these changes in the PR description.")
        sys.exit(1)
    else:
        print("✅ No obvious breaking changes detected")
        sys.exit(0)
except Exception as e:
    print(f"⚠️ Schema comparison failed: {e}")
    sys.exit(0)
EOF
            fi
          else
            echo "⚠️ Could not fetch schemas for comparison"
          fi
        continue-on-error: true
      
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '## API Schema Change Detection\n\n';
            
            if (fs.existsSync('current_schema.json')) {
              const schema = JSON.parse(fs.readFileSync('current_schema.json', 'utf8'));
              comment += `✅ OpenAPI schema generated successfully\n`;
              comment += `- Endpoints: ${Object.keys(schema.paths || {}).length}\n`;
              comment += `- Components: ${Object.keys(schema.components?.schemas || {}).length}\n`;
            } else {
              comment += `⚠️ Could not generate OpenAPI schema\n`;
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
