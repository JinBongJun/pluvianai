name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run weekly on Monday at 9 AM UTC
    - cron: '0 9 * * 1'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    name: Security Vulnerability Scan
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install safety bandit semgrep
      
      - name: Run Safety check (Python dependencies)
        working-directory: ./backend
        run: |
          echo "🔍 Checking Python dependencies for vulnerabilities..."
          safety check --file requirements.txt --json || safety check --file requirements.txt
        continue-on-error: true
      
      - name: Run pip-audit (Alternative vulnerability check)
        working-directory: ./backend
        run: |
          echo "🔍 Running pip-audit as alternative check..."
          pip install pip-audit || true
          python scripts/check_vulnerabilities.py || echo "Vulnerability check completed with warnings"
        continue-on-error: true
      
      - name: Run Bandit (Python security linter)
        working-directory: ./backend
        run: |
          echo "🔍 Running Bandit security linter..."
          bandit -r app/ -f json -o bandit-report.json || bandit -r app/ -ll
        continue-on-error: true
      
      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: backend/bandit-report.json
          if-no-files-found: ignore
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install npm dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Run npm audit
        working-directory: ./frontend
        run: |
          echo "🔍 Checking npm dependencies for vulnerabilities..."
          npm audit --audit-level=moderate --json > npm-audit.json || npm audit --audit-level=moderate
        continue-on-error: true
      
      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: frontend/npm-audit.json
          if-no-files-found: ignore
      
      - name: Run Semgrep (Static analysis)
        run: |
          echo "🔍 Running Semgrep static analysis..."
          docker run --rm -v "${PWD}:/src" returntocorp/semgrep semgrep --config=auto --json --output=semgrep-report.json /src || true
        continue-on-error: true
      
      - name: Upload Semgrep report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-report.json
          if-no-files-found: ignore
      
      - name: Security summary
        if: always()
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Python Dependencies (Safety)" >> $GITHUB_STEP_SUMMARY
          echo "- Checked: requirements.txt" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Python Code (Bandit)" >> $GITHUB_STEP_SUMMARY
          echo "- Scanned: backend/app/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Node.js Dependencies (npm audit)" >> $GITHUB_STEP_SUMMARY
          echo "- Checked: frontend/package.json" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Static Analysis (Semgrep)" >> $GITHUB_STEP_SUMMARY
          echo "- Scanned: Full codebase" >> $GITHUB_STEP_SUMMARY
