name: Database Migration Check

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/app/models/**'
      - 'backend/alembic/**'
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/app/models/**'
      - 'backend/alembic/**'

jobs:
  check-migrations:
    runs-on: ubuntu-latest
    name: Check Database Migrations
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Check for model changes without migration
        working-directory: ./backend
        run: |
          echo "🔍 Checking for model changes without migrations..."
          
          # Generate a new migration to see if there are any changes
          python -m alembic revision --autogenerate -m "check_changes" || true
          
          # Check if any new migration files were created
          NEW_MIGRATIONS=$(find alembic/versions -name "*check_changes.py" -type f)
          
          if [ -n "$NEW_MIGRATIONS" ]; then
            echo "❌ Model changes detected without migration!"
            echo "Please create a migration with: alembic revision --autogenerate -m 'description'"
            rm -f alembic/versions/*check_changes.py
            exit 1
          else
            echo "✅ No model changes detected or migrations are up to date"
          fi
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
      
      - name: Validate migration syntax
        working-directory: ./backend
        run: |
          echo "🔍 Validating migration syntax..."
          python -m alembic check || echo "⚠️ Migration validation warnings (non-blocking)"
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
        continue-on-error: true
      
      - name: Test migrations can be applied
        working-directory: ./backend
        run: |
          echo "🔍 Testing migrations can be applied..."
          python -m alembic upgrade head
          echo "✅ Migrations applied successfully"
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
