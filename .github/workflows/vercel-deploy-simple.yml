name: Trigger Vercel Deployment

on:
  push:
    branches:
      - main

jobs:
  notify-vercel:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deployment via API
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.vercel.com/v1/deployments?projectId=${{ secrets.VERCEL_PROJECT_ID }}&teamId=${{ secrets.VERCEL_TEAM_ID }}&target=production"

