name: AgentGuard CI Integration

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  agentguard-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install agentguard

      - name: Run AgentGuard Model Validation
        env:
          AGENTGUARD_API_KEY: ${{ secrets.AGENTGUARD_API_KEY }}
          AGENTGUARD_PROJECT_ID: ${{ secrets.AGENTGUARD_PROJECT_ID }}
          AGENTGUARD_API_URL: ${{ secrets.AGENTGUARD_API_URL || 'https://api.agentguard.ai' }}
          AGENTGUARD_TIMEOUT: 60
          AGENTGUARD_SKIP_ON_FAILURE: 'true'
        run: |
          python -m agentguard.ci validate \
            --project-id $AGENTGUARD_PROJECT_ID \
            --timeout $AGENTGUARD_TIMEOUT \
            --skip-on-failure $AGENTGUARD_SKIP_ON_FAILURE

      - name: Check validation result
        if: failure() && env.AGENTGUARD_SKIP_ON_FAILURE != 'true'
        run: |
          echo "Model validation failed. Deployment blocked."
          exit 1
