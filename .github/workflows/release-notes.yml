name: Generate Release Notes

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true

jobs:
  generate-release-notes:
    runs-on: ubuntu-latest
    name: Generate Release Notes
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate release notes
        id: release_notes
        run: |
          # Get the tag
          TAG=${GITHUB_REF#refs/tags/}
          if [ -z "$TAG" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          
          echo "Generating release notes for tag: $TAG"
          
          # Get previous tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_TAG" ]; then
            # First release
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            # Get commits since previous tag
            COMMITS=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi
          
          # Categorize commits
          FEATURES=$(echo "$COMMITS" | grep -iE "^-\s*(feat|feature)" || echo "")
          FIXES=$(echo "$COMMITS" | grep -iE "^-\s*(fix|bugfix)" || echo "")
          DOCS=$(echo "$COMMITS" | grep -iE "^-\s*(docs|doc)" || echo "")
          REFACTOR=$(echo "$COMMITS" | grep -iE "^-\s*(refactor|refactoring)" || echo "")
          CHORE=$(echo "$COMMITS" | grep -iE "^-\s*(chore|ci|build)" || echo "")
          OTHER=$(echo "$COMMITS" | grep -vE "^-\s*(feat|feature|fix|bugfix|docs|doc|refactor|refactoring|chore|ci|build)" || echo "")
          
          # Generate release notes
          cat > release_notes.md << EOF
          # Release $TAG
          
          ## 🎉 What's New
          
          $([ -n "$FEATURES" ] && echo "### ✨ Features" && echo "$FEATURES" && echo "" || echo "")
          
          $([ -n "$FIXES" ] && echo "### 🐛 Bug Fixes" && echo "$FIXES" && echo "" || echo "")
          
          $([ -n "$REFACTOR" ] && echo "### ♻️ Refactoring" && echo "$REFACTOR" && echo "" || echo "")
          
          $([ -n "$DOCS" ] && echo "### 📝 Documentation" && echo "$DOCS" && echo "" || echo "")
          
          $([ -n "$CHORE" ] && echo "### 🔧 Chores" && echo "$CHORE" && echo "" || echo "")
          
          $([ -n "$OTHER" ] && echo "### 📦 Other Changes" && echo "$OTHER" || echo "")
          
          ---
          
          **Full Changelog**: \`${PREVIOUS_TAG:-"initial"}..${TAG}\`
          EOF
          
          cat release_notes.md
          
          # Save to output
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          cat release_notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: false
        continue-on-error: true
      
      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release_notes.md
