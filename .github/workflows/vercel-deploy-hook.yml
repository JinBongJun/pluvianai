name: Deploy to Vercel via Hook

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check if secret exists
        run: |
          if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" ]; then
            echo "❌ VERCEL_DEPLOY_HOOK_URL secret is not set"
            exit 1
          else
            echo "✅ VERCEL_DEPLOY_HOOK_URL secret is set"
          fi
      
      - name: Trigger Vercel Deployment
        run: |
          echo "Triggering Vercel deployment..."
          response=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          
          echo "Response code: $http_code"
          echo "Response body: $body"
          
          if [ "$http_code" -eq 200 ] || [ "$http_code" -eq 201 ]; then
            echo "✅ Deployment triggered successfully"
          else
            echo "⚠️ Failed to trigger deployment. HTTP code: $http_code"
            echo "⚠️ This is not critical - Vercel will auto-deploy on push if connected to GitHub"
            echo "⚠️ To fix: Update VERCEL_DEPLOY_HOOK_URL in GitHub Secrets or remove this workflow"
            # Don't fail the workflow - Vercel auto-deploys on push anyway
          fi

