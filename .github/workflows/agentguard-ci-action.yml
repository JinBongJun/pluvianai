name: AgentGuard CI Validation

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      project_id:
        description: 'AgentGuard Project ID'
        required: true
        type: string
      model:
        description: 'Model to validate (e.g., gpt-4-turbo)'
        required: false
        type: string
      provider:
        description: 'Provider (openai, anthropic, google)'
        required: false
        type: string
        default: 'openai'
      timeout:
        description: 'Timeout in seconds'
        required: false
        type: string
        default: '60'
      skip_on_failure:
        description: 'Skip on failure (true/false)'
        required: false
        type: string
        default: 'true'

jobs:
  agentguard-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install httpx

      - name: Run AgentGuard CI Validation
        env:
          AGENTGUARD_API_KEY: ${{ secrets.AGENTGUARD_API_KEY }}
          AGENTGUARD_PROJECT_ID: ${{ github.event.inputs.project_id || secrets.AGENTGUARD_PROJECT_ID }}
          AGENTGUARD_API_URL: ${{ secrets.AGENTGUARD_API_URL || 'https://api.agentguard.ai' }}
          AGENTGUARD_TIMEOUT: ${{ github.event.inputs.timeout || '60' }}
          AGENTGUARD_SKIP_ON_FAILURE: ${{ github.event.inputs.skip_on_failure || 'true' }}
          AGENTGUARD_MODEL: ${{ github.event.inputs.model }}
          AGENTGUARD_PROVIDER: ${{ github.event.inputs.provider || 'openai' }}
        run: |
          python - << 'EOF'
          import os
          import sys
          import httpx
          import time
          
          API_KEY = os.getenv("AGENTGUARD_API_KEY")
          PROJECT_ID = int(os.getenv("AGENTGUARD_PROJECT_ID", "0"))
          API_URL = os.getenv("AGENTGUARD_API_URL", "https://api.agentguard.ai")
          TIMEOUT = int(os.getenv("AGENTGUARD_TIMEOUT", "60"))
          SKIP_ON_FAILURE = os.getenv("AGENTGUARD_SKIP_ON_FAILURE", "true").lower() == "true"
          MODEL = os.getenv("AGENTGUARD_MODEL")
          PROVIDER = os.getenv("AGENTGUARD_PROVIDER", "openai")
          
          if not API_KEY:
              print("❌ AGENTGUARD_API_KEY is required")
              sys.exit(1)
          
          if not PROJECT_ID:
              print("❌ AGENTGUARD_PROJECT_ID is required")
              sys.exit(1)
          
          # Prepare request
          payload = {
              "project_id": PROJECT_ID,
              "timeout": TIMEOUT,
              "skip_on_failure": SKIP_ON_FAILURE,
          }
          
          if MODEL:
              payload["new_model"] = MODEL
              payload["provider"] = PROVIDER
          
          # Make request
          try:
              with httpx.Client(timeout=TIMEOUT + 10) as client:
                  response = client.post(
                      f"{API_URL}/api/v1/ci/validate",
                      json=payload,
                      headers={
                          "Authorization": f"Bearer {API_KEY}",
                          "Content-Type": "application/json",
                      },
                  )
                  response.raise_for_status()
                  result = response.json()
                  
                  validation_id = result.get("validation_id")
                  status = result.get("status")
                  passed = result.get("passed", False)
                  score = result.get("score")
                  elapsed = result.get("elapsed_seconds", 0)
                  
                  if status == "completed":
                      if passed:
                          print(f"✅ AgentGuard: Validation passed (score: {score:.2f}, elapsed: {elapsed:.2f}s)")
                          sys.exit(0)
                      else:
                          message = f"❌ AgentGuard: Validation failed (score: {score:.2f}, elapsed: {elapsed:.2f}s)"
                          if SKIP_ON_FAILURE:
                              print(f"⚠️  {message} - Continuing deployment (skip_on_failure=true)")
                              sys.exit(0)
                          else:
                              print(message)
                              sys.exit(1)
                  else:
                      message = f"⚠️  AgentGuard: Validation status: {status}"
                      if SKIP_ON_FAILURE:
                          print(f"{message} - Continuing deployment (skip_on_failure=true)")
                          sys.exit(0)
                      else:
                          print(message)
                          sys.exit(1)
                          
          except httpx.TimeoutException:
              message = f"⏱️  AgentGuard: Validation timeout after {TIMEOUT}s"
              if SKIP_ON_FAILURE:
                  print(f"⚠️  {message} - Continuing deployment (skip_on_failure=true)")
                  sys.exit(0)
              else:
                  print(message)
                  sys.exit(1)
          
          except httpx.RequestError as e:
              message = f"🌐 AgentGuard: Network error: {str(e)}"
              if SKIP_ON_FAILURE:
                  print(f"⚠️  {message} - Continuing deployment (skip_on_failure=true)")
                  sys.exit(0)
              else:
                  print(message)
                  sys.exit(1)
          
          except Exception as e:
              message = f"❌ AgentGuard: Validation error: {str(e)}"
              if SKIP_ON_FAILURE:
                  print(f"⚠️  {message} - Continuing deployment (skip_on_failure=true)")
                  sys.exit(0)
              else:
                  print(message)
                  sys.exit(1)
          EOF

      - name: Check validation result
        if: failure() && env.AGENTGUARD_SKIP_ON_FAILURE != 'true'
        run: |
          echo "Model validation failed. Deployment blocked."
          exit 1
