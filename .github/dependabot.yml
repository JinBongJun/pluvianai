# Dependabot configuration for automatic dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Python dependencies (backend)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "monthly"  # Changed from weekly to monthly to reduce PR frequency
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3  # Reduced from 5 to 3
    reviewers:
      - "JinBongJun"
    labels:
      - "dependencies"
      - "python"
      - "skip-vercel-preview"  # Label to skip Vercel preview deployments
    commit-message:
      prefix: "chore"
      include: "scope"
    # Group minor and patch updates together
    groups:
      python-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    # Ignore major version updates (too risky for auto-updates)
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # Node.js dependencies (frontend)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "monthly"  # Changed from weekly to monthly to reduce PR frequency
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3  # Reduced from 5 to 3
    reviewers:
      - "JinBongJun"
    labels:
      - "dependencies"
      - "javascript"
      - "skip-vercel-preview"  # Label to skip Vercel preview deployments
    commit-message:
      prefix: "chore"
      include: "scope"
    # Group minor and patch updates together
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    # Ignore major version updates (too risky for auto-updates)
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2  # Reduced from 3 to 2
    labels:
      - "dependencies"
      - "github-actions"
      - "skip-vercel-preview"  # Label to skip Vercel preview deployments
